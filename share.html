<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>曲家崴 · 生日分享页</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14'%3E%F0%9F%8E%89%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #06050f;
      --bg-2: #14112a;
      --bg-3: #08273d;
      --gold: #ffd77f;
      --cyan: #87f2ff;
      --pink: #ff82ba;
      --text: #f8f7ff;
      --glass: rgba(10, 14, 31, 0.64);
      --line: rgba(255, 255, 255, 0.16);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      font-family: "Noto Serif SC", "PingFang SC", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(135, 242, 255, 0.22), transparent 35%),
        radial-gradient(circle at 85% 20%, rgba(255, 130, 186, 0.24), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(255, 215, 127, 0.2), transparent 42%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      background-size: 140% 140%;
      animation: flow 18s ease-in-out infinite alternate;
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      opacity: 0.25;
      filter: blur(14px);
    }

    body::before {
      width: 260px;
      height: 260px;
      top: -80px;
      left: -40px;
      background: linear-gradient(135deg, #64ecff, transparent 60%);
      animation: cloud 10s ease-in-out infinite;
    }

    body::after {
      width: 300px;
      height: 300px;
      right: -120px;
      bottom: -140px;
      background: linear-gradient(145deg, #ff8fc3, transparent 65%);
      animation: cloud 12s ease-in-out infinite reverse;
    }

    .stars,
    .snow {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .stars i {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      animation: twinkle linear infinite;
    }

    .snow i {
      position: absolute;
      top: -10vh;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      animation: drop linear infinite;
    }

    .share-shell {
      position: relative;
      z-index: 2;
      width: min(900px, 100%);
      border-radius: 30px;
      border: 1px solid var(--line);
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
      isolation: isolate;
    }

    .share-shell::before {
      content: "";
      position: absolute;
      inset: -30%;
      z-index: -1;
      opacity: 0.3;
      background: conic-gradient(from 90deg, transparent 0 12%, #64ecff 20%, transparent 34%, #ffd77f 46%, transparent 60%, #ff82ba 72%, transparent 85%);
      animation: ring 14s linear infinite;
    }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 22px;
      padding: 24px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .avatar-box {
      position: relative;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 10px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .avatar-box::before {
      content: "";
      position: absolute;
      inset: -50% -30%;
      background: linear-gradient(130deg, rgba(255, 215, 127, 0.56), transparent 55%, rgba(135, 242, 255, 0.45));
      animation: sweep 5s linear infinite;
    }

    .avatar {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: #f6f4ea;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.36);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(3, 7, 19, 0.7);
    }

    .profile-mini {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
      opacity: 0.92;
    }

    .profile-mini img {
      width: 100%;
      display: block;
    }

    .right {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .tag {
      width: fit-content;
      border-radius: 999px;
      border: 1px solid rgba(135, 242, 255, 0.45);
      color: var(--cyan);
      background: rgba(14, 27, 52, 0.62);
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 6px 12px;
    }

    h1 {
      margin: 0;
      line-height: 1.12;
      letter-spacing: 0.03em;
      font-size: clamp(40px, 8vw, 78px);
      text-wrap: balance;
    }

    h1 .name {
      display: inline-block;
      background: linear-gradient(120deg, #fff9dc, var(--gold), #ffe59d 72%);
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }

    .brush {
      font-family: "Ma Shan Zheng", cursive;
      color: #b5f8ff;
      font-size: clamp(28px, 5vw, 44px);
      text-shadow: 0 0 20px rgba(113, 241, 255, 0.42);
    }

    .line {
      margin: 0;
      font-size: clamp(16px, 2.6vw, 25px);
      color: #f0f4ff;
      min-height: 1.8em;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }

    .cursor {
      color: #8bf2ff;
      animation: blink 0.8s steps(1) infinite;
      margin-left: 2px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta span {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .btn-main {
      color: #11182e;
      background: linear-gradient(135deg, #ffeab7, #ffd77f);
      box-shadow: 0 10px 24px rgba(255, 215, 127, 0.32);
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(255, 215, 127, 0.42);
    }

    .btn-ghost {
      color: #ebf4ff;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-ghost:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.15);
    }

    .note {
      margin: 0;
      color: rgba(222, 233, 255, 0.88);
      font-size: 14px;
      line-height: 1.7;
      max-width: 62ch;
    }

    .toast {
      position: fixed;
      z-index: 6;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      bottom: max(18px, env(safe-area-inset-bottom));
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(8, 17, 36, 0.82);
      color: #ecf5ff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter: blur(10px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #fx {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    @media (max-width: 860px) {
      body {
        place-items: start center;
      }

      .share-shell {
        width: 100%;
        min-height: calc(100dvh - max(18px, env(safe-area-inset-top)) - max(18px, env(safe-area-inset-bottom)));
      }

      .main {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 16px;
      }

      .left {
        align-items: center;
      }

      .avatar-box {
        width: min(360px, 100%);
      }

      .profile-mini {
        display: none;
      }

      .right {
        text-align: center;
        align-items: center;
      }

      .tag {
        margin-inline: auto;
      }

      .meta,
      .actions {
        justify-content: center;
      }

      .note {
        text-align: left;
      }
    }

    @media (max-width: 460px) {
      h1 {
        font-size: clamp(34px, 12vw, 54px);
      }

      .line {
        font-size: 18px;
      }

      .actions,
      .actions button {
        width: 100%;
      }

      .actions button {
        padding: 12px 14px;
      }

      .meta {
        width: 100%;
      }

      .meta span {
        flex: 1;
        text-align: center;
      }
    }

    @keyframes flow {
      from { background-position: 0% 0%; }
      to { background-position: 100% 100%; }
    }

    @keyframes cloud {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(14px, 20px) scale(1.1); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    @keyframes drop {
      to {
        transform: translateY(115vh) translateX(var(--drift, 0px));
      }
    }

    @keyframes ring {
      to { transform: rotate(360deg); }
    }

    @keyframes sweep {
      0% { transform: translateX(-30%) rotate(15deg); }
      100% { transform: translateX(30%) rotate(15deg); }
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="snow" id="snow"></div>

  <section class="share-shell" aria-label="生日分享页">
    <div class="main">
      <div class="left">
        <div class="avatar-box">
          <div class="avatar">
            <img src="./assets/avatar.jpg" alt="曲家崴头像">
          </div>
        </div>
        <div class="badge-row">
          <span class="badge">曲家崴</span>
          <span class="badge">ESTP</span>
          <span class="badge">山东烟台</span>
          <span class="badge">03/10</span>
        </div>
        <div class="profile-mini">
          <img src="./assets/profile.png" alt="资料图">
        </div>
      </div>

      <div class="right">
        <div class="tag">ONE TAP SHARE EDITION</div>
        <h1><span class="name">曲家崴</span><br>生日快乐</h1>
        <div class="brush">今天由你主场，快乐全场开麦</div>
        <p class="line" id="typing"></p>

        <div class="meta">
          <span>昵称：Cointreau.</span>
          <span>微信：Marsyz-Q10</span>
          <span>个签：下雪了。</span>
        </div>

        <div class="actions">
          <button id="shareBtn" class="btn-main" type="button">一键分享</button>
          <button id="copyBtn" class="btn-ghost" type="button">复制祝福文案</button>
          <button id="fireBtn" class="btn-ghost" type="button">再放一轮烟花</button>
        </div>

        <p class="note">
          祝你新一岁继续自由、勇敢、热烈，
          想做的事都有回响，想见的人都在身边。
          今天是 3 月 10 日，生日快乐，曲家崴。
        </p>
      </div>
    </div>
  </section>

  <canvas id="fx"></canvas>
  <div class="toast" id="toast"></div>

  <script>
    const lines = [
      "今天由你主场，快乐全场开麦。",
      "愿你行动力爆表，目标一路命中。",
      "愿你继续又酷又真，闪闪发光。"
    ];

    const typingEl = document.getElementById("typing");
    let li = 0;
    let ci = 0;
    let back = false;

    function writer() {
      const text = lines[li];
      if (!back) {
        ci += 1;
        typingEl.innerHTML = text.slice(0, ci) + '<span class="cursor">|</span>';
        if (ci >= text.length) {
          back = true;
          setTimeout(writer, 1500);
          return;
        }
        setTimeout(writer, 70);
      } else {
        ci -= 1;
        typingEl.innerHTML = text.slice(0, ci) + '<span class="cursor">|</span>';
        if (ci <= 0) {
          back = false;
          li = (li + 1) % lines.length;
        }
        setTimeout(writer, 34);
      }
    }
    writer();

    const stars = document.getElementById("stars");
    const snow = document.getElementById("snow");

    function seedStars(count = 55) {
      for (let i = 0; i < count; i += 1) {
        const s = document.createElement("i");
        s.style.left = `${Math.random() * 100}vw`;
        s.style.top = `${Math.random() * 100}vh`;
        s.style.animationDuration = `${2.8 + Math.random() * 4.5}s`;
        s.style.animationDelay = `${Math.random() * 2.5}s`;
        const size = 1 + Math.random() * 2.6;
        s.style.width = `${size}px`;
        s.style.height = `${size}px`;
        stars.appendChild(s);
      }
    }

    function seedSnow(count = 32) {
      for (let i = 0; i < count; i += 1) {
        const n = document.createElement("i");
        n.style.left = `${Math.random() * 100}vw`;
        n.style.animationDuration = `${6 + Math.random() * 8}s`;
        n.style.animationDelay = `${-Math.random() * 8}s`;
        const size = 2 + Math.random() * 4;
        n.style.width = `${size}px`;
        n.style.height = `${size}px`;
        n.style.setProperty("--drift", `${(Math.random() - 0.5) * 80}px`);
        snow.appendChild(n);
      }
    }

    seedStars();
    seedSnow();

    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    const particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    function burst(x, y, n = 100) {
      const colors = ["#ffd77f", "#87f2ff", "#ff82ba", "#ffffff", "#9effc9"];
      for (let i = 0; i < n; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4.8;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 50 + Math.random() * 50,
          alpha: 1,
          size: 1.4 + Math.random() * 2.6,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.035;
        p.vx *= 0.992;
        p.life -= 1;
        p.alpha -= 0.013;

        if (p.life <= 0 || p.alpha <= 0) {
          particles.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.globalAlpha = Math.max(p.alpha, 0);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(render);
    }
    render();

    function showFireworks() {
      const cx = window.innerWidth * (0.28 + Math.random() * 0.44);
      const cy = window.innerHeight * (0.17 + Math.random() * 0.32);
      burst(cx, cy, 96);
      setTimeout(() => burst(cx - 80, cy + 30, 76), 160);
      setTimeout(() => burst(cx + 90, cy - 18, 78), 320);
    }

    setTimeout(showFireworks, 900);
    setTimeout(showFireworks, 1800);
    setTimeout(showFireworks, 2700);

    document.getElementById("fireBtn").addEventListener("click", showFireworks);

    const toastEl = document.getElementById("toast");
    let toastTimer;

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
    }

    const shareText = "今天 3 月 10 日，祝曲家崴生日快乐！愿你新一岁继续自由、勇敢、热烈。";

    async function copyText(text, okMsg = "已复制") {
      try {
        await navigator.clipboard.writeText(text);
        toast(okMsg);
      } catch (_) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        toast(okMsg);
      }
    }

    document.getElementById("copyBtn").addEventListener("click", () => {
      copyText(`${shareText}\n${location.href}`, "祝福文案已复制");
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      showFireworks();
      if (navigator.share) {
        try {
          await navigator.share({
            title: "曲家崴 · 生日快乐",
            text: shareText,
            url: location.href
          });
          toast("分享已触发");
          return;
        } catch (_) {
        }
      }
      await copyText(location.href, "链接已复制，快去发给朋友");
    });
  </script>
</body>
</html>
